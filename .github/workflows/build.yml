name: Build NasuaOS

on:
  push:
    branches:
      - main
    paths:
      - "kernel/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            gcc \
            g++ \
            cmake \
            xorriso \
            clang \
            lld \
            nasm \
            mtools \
            qemu-system-x86

      - name: Build ISO
        run: |
          make all

      - name: Build HDD image
        run: |
          make all-hdd

      - name: Find images
        run: |
          echo "Generated files:"
          find . \( -name "*.iso" -o -name "*.hdd" \) -type f

      - name: Prepare release files
        run: |
          mkdir release

          cp $(find . -name "*.iso" | head -n 1) release/NasuaOS.iso
          cp $(find . -name "*.hdd" | head -n 1) release/NasuaOS.hdd

          cd release

          printf "![Logo](https://raw.githubusercontent.com/szatakis/NasuaOS/main/documentation/images/logo.png)" > README.md
          printf "# NasuaOS Builds\n\n" >> README.md
          printf "Prebuilt images are available for testing in QEMU, VirtualBox, or on real hardware.\n\n" >> README.md

          printf "## Available Images\n\n" >> README.md
          printf "| Image | Description |\n" >> README.md
          printf "|-------|-------------|\n" >> README.md
          printf "| **NasuaOS.iso** | Bootable ISO image for CD/DVD or USB media. Compatible with QEMU, VirtualBox, and real hardware. |\n" >> README.md
          printf "| **NasuaOS.hdd** | Virtual hard disk image intended primarily for QEMU and other virtual machines. |\n\n" >> README.md

          printf "## Running in QEMU\n\n" >> README.md
          printf "\`\`\`bash\n" >> README.md
          printf "qemu-system-x86_64 -hda NasuaOS.hdd\n" >> README.md
          printf "\`\`\`\n\n" >> README.md

          printf "## Booting the ISO\n\n" >> README.md
          printf "\`\`\`bash\n" >> README.md
          printf "qemu-system-x86_64 -cdrom NasuaOS.iso -boot d\n" >> README.md
          printf "\`\`\`\n\n" >> README.md

          printf "You can also write the ISO image to a USB flash drive and boot it on supported hardware.\n" >> README.md

      - name: Push builds to iso branch
        run: |
          cd release

          git init
          git checkout -b iso

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "Update NasuaOS builds"

          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push --force origin iso