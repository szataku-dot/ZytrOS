name: Build NasuaOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            gcc \
            g++ \
            cmake \
            xorriso \
            clang \
            lld \
            nasm \
            mtools \
            qemu-system-x86

      - name: Build ISO
        run: |
          make all

      - name: Build HDD image
        run: |
          make all-hdd

      - name: Find images
        run: |
          echo "Generated files:"
          find . \( -name "*.iso" -o -name "*.hdd" \) -type f

      - name: Prepare release files
        run: |
          mkdir release

          cp $(find . -name "*.iso" | head -n 1) release/NasuaOS.iso
          cp $(find . -name "*.hdd" | head -n 1) release/NasuaOS.hdd

          cd release

          printf "# NasuaOS Builds\n\n" > README.md
          printf "## ISO\n" >> README.md
          printf "Boot from CD/USB:\n" >> README.md
          printf "  NasuaOS.iso\n\n" >> README.md

          printf "## HDD\n" >> README.md
          printf "For QEMU:\n" >> README.md
          printf "  NasuaOS.hdd\n\n" >> README.md

          printf "Example:\n" >> README.md
          printf "    qemu-system-x86_64 -hda NasuaOS.hdd\n" >> README.md

      - name: Push builds to iso branch
        run: |
          cd release

          git init
          git checkout -b iso

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "Update NasuaOS builds"

          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push --force origin iso